<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equalizer Learning Hub</title>
    <style>
      /* Suppress Google Translate banner — must be inline so it loads before GT script */
      .goog-te-banner-frame,
      iframe.goog-te-banner-frame,
      .skiptranslate { display: none !important; visibility: hidden !important; }
      body { top: 0px !important; }
      .goog-te-gadget { font-size: 0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      // Keep GT banner hidden even after dynamic injection
      (function() {
        function hideGTBanner() {
          var f = document.querySelector('iframe.goog-te-banner-frame');
          if (f) f.style.setProperty('display', 'none', 'important');
          if (document.body && document.body.style.top && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
        }
        var obs = new MutationObserver(hideGTBanner);
        document.addEventListener('DOMContentLoaded', function() {
          obs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
