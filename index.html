<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equalizer Learning Hub</title>
    <style>
      /* Only hide the banner iframe — do NOT hide .skiptranslate broadly
         or the combo select inside it won't respond to programmatic events */
      iframe.goog-te-banner-frame { display: none !important; }
      #google_translate_element { display: none !important; }
      .goog-te-gadget { visibility: hidden !important; height: 0 !important; overflow: hidden !important; }
      body { top: 0px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      (function() {
        function hideGTBanner() {
          var f = document.querySelector('iframe.goog-te-banner-frame');
          if (f) f.style.setProperty('display', 'none', 'important');
          if (document.body && document.body.style.top && document.body.style.top !== '0px') {
            document.body.style.setProperty('top', '0px', 'important');
          }
        }
        // Poll aggressively for 8 seconds after page load to catch GT injecting the banner
        var _poll = setInterval(hideGTBanner, 50);
        setTimeout(function() { clearInterval(_poll); }, 8000);
        // Also use MutationObserver for long-running sessions
        document.addEventListener('DOMContentLoaded', function() {
          hideGTBanner();
          new MutationObserver(hideGTBanner).observe(document.body, {
            childList: true, attributes: true, attributeFilter: ['style']
          });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
