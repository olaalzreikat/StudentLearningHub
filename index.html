<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equalizer Learning Hub</title>
    <script>
      /* Apply saved theme before first paint to avoid flash */
      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
    <style>
      /* Hide Google Translate UI — translation still works via cookie */
      iframe.goog-te-banner-frame { display: none !important; }
      .goog-te-banner-frame { display: none !important; }
      #google_translate_element { display: none !important; }
      .goog-te-gadget { display: none !important; }
      body { top: 0px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      // Continuously force body.top to 0 so GT can't push content down
      (function() {
        function fix() {
          if (document.body && document.body.style.top && document.body.style.top !== '0px')
            document.body.style.setProperty('top', '0px', 'important');
        }
        document.addEventListener('DOMContentLoaded', function() {
          fix();
          new MutationObserver(fix).observe(document.body, { attributes: true, attributeFilter: ['style'] });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
